<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contact Us - Whitewater Rafting</title>

    <meta name="description"
      content="Contact Whitewater Rafting to book trips, ask questions, share feedback, and connect with our experienced rafting team.">
    ">

    <meta name="author" content="Rebecca Vicente">

    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

    <header>
        <div class="logo">
            <img src="images/boat_logo.jpg" alt="Whitewater Rafting Company Logo">
        </div>

        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>

        <!-- COMPANY INFORMATION -->

        <section class="company-info">

            <h1>White Water Rafting Company</h1>

            <p>301 Biscayne Blvd,</p>
            <p>Miami, FL 33132</p>
            <p>+1 999 999 9999</p>
            <p>info@whitewater.com</p>

        </section>

        <!-- MAP AND CONTACT FORM -->
        <section class="contact-container">

            <div class="map">

                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d7613.089179806271!2d-80.19295400521945!3d25.773878470332175!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x88d9b420c7c5d977%3A0x9fc29bc38767db55!2sBayfront%20Park!5e0!3m2!1sen!2sbr!4v1780586924292!5m2!1sen!2sbr"
                  allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade">
                </iframe>

            </div>

            <!-- form goes here -->

            <form class="contact-form">

                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Enter your name" required>

                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>

                <div class="radio-group">
                    <p>Message </p>
                    <p>Purpose</p>

                    <div class="radio-options">
                        <label>
                            <input type="radio" id="general" name="purpose" value="general"
                              required>
                            General Inquiry
                        </label>

                        <label>
                            <input type="radio" id="reservation" name="purpose" value="reservation">
                            Reservation Question
                        </label>

                        <label>
                            <input type="radio" id="suggestion" name="purpose" value="suggestion">
                            Website Suggestion
                        </label>
                    </div>
                </div>
                <div class="message-section">
                    <label for="message">Message</label>

                    <textarea id="message" name="message" placeholder="Type your message here"
                      required></textarea>

                    <label class="checkbox">
                        <input type="checkbox" name="newsletter">
                        Please subscribe me to the monthly newsletter
                    </label>

                    <button type="submit">Get in Touch!</button>
                </div>

            </form>

        </section>

        <!-- EMPLOYEE PROFILES -->

        <section class="employees">

            <h2>We Are Here to Serve You</h2>

            <div class="employee-cards">

                <figure>
                    <img src="images/employee1.jpg" alt="John Smith, Lead Guide">
                    <figcaption>John Smith - Lead Guide</figcaption>
                </figure>

                <figure>
                    <img src="images/employee2.jpg" alt="Sarah Johnson, River Guide">
                    <figcaption>Sarah Johnson - River Guide</figcaption>
                </figure>

                <figure>
                    <img src="images/employee3.jpg" alt="Mike Brown, Trip Coordinator">
                    <figcaption>Mike Brown - Trip Coordinator</figcaption>
                </figure>

            </div>

        </section>

    </main>

    <footer>

        <p>©2026 🚀 Whitewater Rafting 🚀 Rebecca Vicente</p>

        <nav class="socialmedia">

            <a href="https://facebook.com">
                <img src="images/facebook_logo.jpg" alt="Facebook icon">
            </a>

            <a href="https://instagram.com">
                <img src="images/instagram_logo.jpg" alt="Instagram icon">
            </a>

            <a href="https://youtube.com">
                <img src="images/youtube_logo.jpg" alt="YouTube icon">
            </a>

        </nav>

    </footer>

</body>

</html>
